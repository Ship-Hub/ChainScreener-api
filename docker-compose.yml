services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: chain_screener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - chain_screener_pg:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - chain_screener_redis:/data

volumes:
  chain_screener_pg:
  chain_screener_redis:
