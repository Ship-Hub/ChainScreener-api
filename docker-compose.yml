services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: chain_screener
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - chain_screener_mysql:/var/lib/mysql
      - ./db/schema.mysql.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - chain_screener_redis:/data

volumes:
  chain_screener_mysql:
  chain_screener_redis:
