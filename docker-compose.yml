services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chain
      POSTGRES_PASSWORD: chain
      POSTGRES_DB: chain_screener
    ports:
      - "5432:5432"
    volumes:
      - chain_screener_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chain -d chain_screener"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  chain_screener_pgdata:
